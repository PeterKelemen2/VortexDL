# One-command local stack: `docker compose up --build`
# Frontend (nginx) serves the SPA and proxies API calls to the backend.
# Backend runs FastAPI/uvicorn and applies migrations on startup.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ytdlp-client-backend
    env_file:
      - ./backend/.env
    environment:
      # Persisted SQLite DB inside the mounted data volume (alembic derives its
      # sync URL from this by stripping the +aiosqlite driver).
      SQLALCHEMY_DATABASE_URI: sqlite+aiosqlite:////app/data/app.db
      DOWNLOAD_DIR: /app/downloads
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-downloads:/app/downloads
    expose:
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin: nginx proxies /auth, /admin, /uploads, /jobs to backend.
        VITE_BACKEND_URL: ""
    image: ytdlp-client-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
  backend-downloads:
